<!DOCTYPE html>
<html>
<head>
  <title>Contact Me</title>
</head>
<body style="background-color: #F5F0E6; font-family: Arial, serif;">

  <p style="text-align: center;">
    <a href="index.html" style="color: #76A63D; text-decoration: none;">Home</a>
    &nbsp;&nbsp;&nbsp;&nbsp;
    <a href="aboutme.html" style="color: #76A63D; text-decoration: none;">About</a>
    &nbsp;&nbsp;&nbsp;&nbsp;
    <a href="contact.html" style="color: #76A63D; text-decoration: none;">Contact</a>
  </p>

  <img src="IMG_3993.png" alt="Nature Banner" style="display: block; margin: 0 auto; width: 100%; max-width: 900px; height: 250px; object-fit: cover;">
  
  <h1 style="text-align: center; color: #76A63D;">Contact Me</h1>

  <form action="/contact" method="POST" style="text-align: center;">
    <p>
      <label>Name:</label><br>
      <input type="text" name="name" required>
    </p>
    <p>
      <label>Email:</label><br>
      <input type="email" name="email" required>
    </p>
    <p>
      <label>Message:</label><br>
      <textarea name="message" rows="5" cols="30" required></textarea>
    </p>

    <div class="cf-turnstile" data-sitekey="0x4AAAAAADoIAyjKg_wufeNO" style="display: inline-block; margin: 10px 0;"></div>

    <button type="submit">Send</button>
  </form>

  <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>

</body>
</html>
