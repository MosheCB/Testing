<!DOCTYPE html>
<html>
<head>
  <title>Contact Me</title>
  <style>
    .navigation {
      background-color: #f5f5f5;
      padding: 1rem;
    }

    .nav-list {
      list-style: none;
      display: flex;
      gap: 2rem;
      margin: 0;
      padding: 0;
    }

    .nav-item {
      display: inline;
    }

    .nav-link {
      text-decoration: none;
      color: #333;
      font-weight: 500;
      transition: color 0.3s ease;
    }

    .nav-link:hover {
      color: #0066cc;
    }

    .nav-link.active {
      color: #0066cc;
      border-bottom: 2px solid #0066cc;
    }
  </style>
</head>
<body style="background-color: #F5F0E6;">
  <nav class="navigation">
    <ul class="nav-list">
      <li class="nav-item">
        <a href="index.html" class="nav-link">Home</a>
      </li>
      <li class="nav-item">
        <a href="aboutme.html" class="nav-link">About</a>
      </li>
      <li class="nav-item">
        <a href="contact.html" class="nav-link active">Contact</a>
      </li>
    </ul>
  </nav>

  <h1 style="text-align: center; color: #76A63D;">Contact Me</h1>

  <form action="/contact" method="POST" style="text-align: center;">
    <p>
      <label>Name:</label><br>
      <input type="text" name="name" required>
    </p>
    <p>
      <label>Email:</label><br>
      <input type="email" name="email" required>
    </p>
    <p>
      <label>Message:</label><br>
      <textarea name="message" rows="5" cols="30" required></textarea>
    </p>

    <div class="cf-turnstile" data-sitekey="0x4AAAAAADoIAyjKg_wufeNO" style="display: inline-block; margin: 10px 0;"></div>

    <button type="submit">Send</button>
  </form>

  <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>

</body>
</html>
